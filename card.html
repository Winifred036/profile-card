<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .profile-card{
            width: 100% ;
            max-width: 400px;
            min-height: 250px;

            box-sizing: border-box;

            padding: 15px;
            border: 2px solid #333;
            margin: 20px auto;
        }

        .profile-card img{
            width: 100px;

        }

        .profile-card h2{
            margin-bottom: 15px;
        }

        .profile-card p{
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <img src="media/IMG_0923[1].JPG" alt="Profile Picture">
        <h2>Winifred LongJohn</h2>
        <p>
            Student in Computer Engineering currently building skills in Web Development.
        </p>

    </div>
</body>
</html>
